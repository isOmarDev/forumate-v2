services:
  db:
    image: postgres:17-alpine
    container_name: dddforum-postgres
    restart: unless-stopped
    env_file:
      - .env.development
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql

  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      - db

volumes:
  pgdata: